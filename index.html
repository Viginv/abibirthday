<!DOCTYPE html>
<html>
<head>
    <title>Saudi Midnight Redirect</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<h1>Page will open next page at 12:00 AM Saudi Time</h1>
<div id="clock"></div>

<script>
function checkSaudiMidnight() {
    const now = new Date();

    // Get Saudi Arabia time
    const saudiTime = new Date(
        now.toLocaleString("en-US", { timeZone: "Asia/Riyadh" })
    );

    const h = saudiTime.getHours();
    const m = saudiTime.getMinutes();
    const s = saudiTime.getSeconds();

    // Show live Saudi time
    document.getElementById("clock").textContent =
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

    // Redirect exactly at 12:00:00 AM Saudi time
    if (h === 0 && m === 0 && s === 0) {
        window.location.href = "nextpage.html";
    }
}

// Run every second
setInterval(checkSaudiMidnight, 1000);
</script>

</body>
</html>
