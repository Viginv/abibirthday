<!DOCTYPE html>
<html>
<head>
<title>Timer Page</title>

    <!--! This is  for comand -->
    <link rel="stylesheet" href="Style.css">

</head>

<h1>Page opens at 12:00 AM (sleep wake up)</h1>
<div id="clock"></div>

<script>
function showClockAndRedirect() {
    let now = new Date();

    // Get Saudi Arabia time
    let saudiTime = new Date(
        now.toLocaleString("en-US", { timeZone: "Asia/Riyadh" })
    );

    let h = saudiTime.getHours();
    let m = saudiTime.getMinutes();
    let s = saudiTime.getSeconds();

    // Display the clock
    document.getElementById("clock").innerHTML = 
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

    // Redirect at exactly 12:00:00 AM
    if (h === 0 && m === 0 && s === 0) {
        window.location.href = "nextpage.html";
    }
}

// Update every second
setInterval(showClockAndRedirect, 1000);
</script>
